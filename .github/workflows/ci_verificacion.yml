name: Project Verification CI

on:
  pull_request:
    branches: [ "develop","main" ]
  push:
    # Se cubren ramas feature con y sin subcarpetas, además de las ramas de integración.
    branches: [ "feature-*", "feature/**", "develop", "main" ]
  workflow_dispatch:

concurrency:
  group: project-verification-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verificacion:
    runs-on: ubuntu-latest

    defaults:
      run:
        # Igual que en CD, el frontend es el objetivo principal de esta verificación.
        working-directory: apps/web

    steps:
      - name: Obtener código fuente
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configurar Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Verificar calidad del código
        run: npm run lint

      - name: Ejecutar pruebas
        run: npm test --if-present

      - name: Resumen de verificación
        run: |
          # Se deja una traza corta para identificar rápidamente qué rama pasó por el workflow.
          echo "Rama: $GITHUB_REF_NAME"
          echo "Autor: $GITHUB_ACTOR"
          echo "Verificación exitosa"
