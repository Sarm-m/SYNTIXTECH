name: SonarCloud Analysis

on:
  push:
    branches:
      - develop
      - main
      - feature-*
      - feature/**

  pull_request:
    branches:
      - develop
      - main
    types:
      - opened
      - synchronize
      - reopened

  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Run lint
        working-directory: apps/web
        run: npm run lint

      - name: Audit frontend dependencies
        working-directory: apps/web
        run: npm audit --audit-level=moderate || echo "::notice::Frontend audit reported vulnerabilities; review npm audit output."

      - name: Run unit tests with coverage
        working-directory: apps/web
        run: npm test

      - name: Generate own quality metrics evidence
        working-directory: apps/web
        run: npm run quality:metrics

      - name: Validate production build
        working-directory: apps/web
        run: npm run build

      - name: Upload quality evidence
        uses: actions/upload-artifact@v4
        with:
          name: sonar-quality-evidence
          path: |
            apps/web/coverage/lcov.info
            apps/web/coverage/quality-metrics-report.json
          retention-days: 14

      - name: Check SonarCloud configuration
        id: sonar-config
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_ORGANIZATION" ] || [ -z "$SONAR_PROJECT_KEY" ]; then
            echo "::notice::SonarCloud is not fully configured. Skipping analysis."
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Run SonarCloud analysis
        if: steps.sonar-config.outputs.configured == 'true'
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
