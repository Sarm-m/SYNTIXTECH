name: SonarCloud Analysis

on:
  push:
    branches:
      - develop
      - main
      - feature-*
      - feature/**

  pull_request:
    branches:
      - develop
      - main
    types:
      - opened
      - synchronize
      - reopened

  workflow_dispatch:

concurrency:
  group: sonarcloud-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Run lint
        working-directory: apps/web
        run: npm run lint

      - name: Audit frontend dependencies
        working-directory: apps/web
        run: npm audit --audit-level=high

      - name: Run unit tests with coverage
        working-directory: apps/web
        run: npm test

      - name: Generate own quality metrics evidence
        working-directory: apps/web
        run: npm run quality:metrics

      - name: Validate production build
        working-directory: apps/web
        run: npm run build

      - name: Upload quality evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sonar-quality-evidence
          path: |
            apps/web/coverage/lcov.info
            apps/web/coverage/quality-metrics-report.json
          retention-days: 14

      - name: Check SonarCloud configuration
        id: sonar-config
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_ORGANIZATION" ] || [ -z "$SONAR_PROJECT_KEY" ]; then
            echo "::notice::SonarCloud is not fully configured. Skipping analysis."
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Run SonarCloud analysis
        if: steps.sonar-config.outputs.configured == 'true'
        uses: SonarSource/sonarqube-scan-action@c7ee0f9df90b7aa20e8dcf9695dcfe2e7da5b4f2 # v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
