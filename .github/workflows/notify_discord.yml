name: Discord Notification

on:
  workflow_call:
    inputs:
      status:
        required: true
        type: string
      workflow_name:
        required: true
        type: string
    secrets:
      DISCORD_WEBHOOK_URL:
        required: false

permissions: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STATUS: ${{ inputs.status }}
          WORKFLOW_NAME: ${{ inputs.workflow_name }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::notice::DISCORD_WEBHOOK_URL is not configured. Skipping Discord notification."
            exit 0
          fi

          node <<'NODE' > "$RUNNER_TEMP/discord-payload.json"
          const succeeded = process.env.STATUS === 'success';
          const repository = process.env.REPOSITORY;
          const sha = process.env.SHA;
          const payload = {
            embeds: [{
              title: `Pipeline ${succeeded ? 'succeeded' : 'failed'}`,
              description: [
                `**Workflow:** ${process.env.WORKFLOW_NAME}`,
                `**Branch:** ${process.env.REF_NAME}`,
                `**Commit:** [${sha}](https://github.com/${repository}/commit/${sha})`,
                `**Actor:** ${process.env.ACTOR}`,
              ].join('\n'),
              color: succeeded ? 3066993 : 15158332,
            }],
          };
          process.stdout.write(JSON.stringify(payload));
          NODE

          if ! curl --fail --silent --show-error \
            --header "Content-Type: application/json" \
            --data-binary @"$RUNNER_TEMP/discord-payload.json" \
            "$DISCORD_WEBHOOK_URL"; then
            echo "::notice::Discord notification failed; continuing without failing the workflow."
          fi
