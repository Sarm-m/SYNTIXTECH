name: Discord Notification

on:
  workflow_call:
    inputs:
      status:
        required: true
        type: string
      workflow_name:
        required: true
        type: string
    secrets:
      DISCORD_WEBHOOK_URL:
        required: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::notice::DISCORD_WEBHOOK_URL is not configured. Skipping Discord notification."
            exit 0
          fi

          if [ "${{ inputs.status }}" = "success" ]; then
            COLOR=3066993
            MESSAGE="succeeded"
          else
            COLOR=15158332
            MESSAGE="failed"
          fi
          PAYLOAD=$(printf '{"embeds":[{"title":"Pipeline %s","description":"**Workflow:** %s\n**Branch:** %s\n**Commit:** [%s](https://github.com/%s/commit/%s)\n**Actor:** %s","color":%s}]}' \
            "$MESSAGE" \
            "${{ inputs.workflow_name }}" \
            "${{ github.ref_name }}" \
            "${{ github.sha }}" \
            "${{ github.repository }}" \
            "${{ github.sha }}" \
            "${{ github.actor }}" \
            "$COLOR")
          if ! curl -fsS -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"; then
            echo "::notice::Discord notification failed; continuing without failing the workflow."
          fi
