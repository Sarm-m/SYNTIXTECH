name: Artifact Delivery CD
on:
  push:
    # Solo se empaqueta al integrar en ramas de consolidación del proyecto.
    branches: [ "main", "develop" ] 

permissions: {}

jobs:
  entrega:
    name: Empaquetado y Generación de Entregable
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        # El build real del frontend vive en apps/web, así que todos los pasos se ejecutan allí.
        working-directory: apps/web

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configurar Node.js (v20)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Instalar dependencias limpias
        run: npm ci

      - name: Construir aplicación de producción (Build)
        run: npm run build

      - name: Confirmación de la entrega
        run: |
          echo "El software ha sido empaquetado exitosamente"
         

      - name: Guardar Artefacto (Entregable Final)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: DriveControl-Build-Produccion
          # El artefacto resultante se publica para revisión o descarga manual posterior.
          path: dist/apps/web
          retention-days: 7

  notify:
    needs: [entrega]
    if: always()
    uses: ./.github/workflows/notify_discord.yml
    with:
      status: ${{ needs.entrega.result }}
      workflow_name: "Artifact Delivery CD"
    secrets:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
