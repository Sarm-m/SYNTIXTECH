sonar.sources=.
sonar.tests=apps/web/src,backend/test
sonar.test.inclusions=apps/web/src/**/*.test.js,apps/web/src/**/*.spec.js,apps/web/src/**/__tests__/**,apps/web/src/test/**,backend/test/**

# Solo se excluyen dependencias, salidas generadas y evidencia historica/no productiva.
sonar.exclusions=\
**/node_modules/**,\
**/coverage/**,\
**/dist/**,\
apps/web/src/**/*.test.js,\
apps/web/src/**/*.spec.js,\
apps/web/src/**/__tests__/**,\
apps/web/src/test/**,\
backend/test/**,\
docs/archive/**,\
docs/QA/datos_mongo_seed/**,\
docs/Entrega-Final/**,\
docs/upstream-evidence/**

# Entrypoints e infraestructura declarativa no tienen logica unitaria ejecutable.
sonar.coverage.exclusions=\
.github/workflows/**,\
Dockerfile,\
apps/web/Dockerfile,\
docker-compose.yml,\
docker-compose.prod.yml,\
apps/web/src/main.jsx,\
apps/web/src/index.css

sonar.javascript.lcov.reportPaths=apps/web/coverage/lcov.info
sonar.sourceEncoding=UTF-8
